# 本地开发数据库（架构决策：PostgreSQL + 数据卷在容器外）
services:
  db:
    image: postgres:16-alpine
    container_name: oneday-db
    environment:
      POSTGRES_USER: oneday
      POSTGRES_PASSWORD: oneday_dev
      POSTGRES_DB: oneday
    ports:
      - "5433:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
